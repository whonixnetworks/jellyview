<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bellGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="tentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="70%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="0" fill="#0F172A"/>

  <!-- Bell dome -->
  <ellipse cx="256" cy="208" rx="125" ry="82" fill="url(#bellGrad)"/>

  <!-- Inner highlight -->
  <ellipse cx="256" cy="178" rx="65" ry="52" fill="url(#highlightGrad)" opacity="0.6"/>

  <!-- Rim (flat bottom) -->
  <rect x="131" y="284" width="250" height="14" fill="#4338CA" rx="2"/>

  <!-- Cyan rim highlight -->
  <line x1="139" y1="284" x2="373" y2="284" stroke="#22D3EE" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="234" cy="193" r="7" fill="white"/>
  <circle cx="278" cy="193" r="7" fill="white"/>
  <circle cx="234" cy="194" r="3.5" fill="#4338CA"/>
  <circle cx="278" cy="194" r="3.5" fill="#4338CA"/>

  <!-- Left tentacles -->
  <path d="M 176 298 Q 170 350, 165 400 Q 160 435, 154 465" stroke="#6366F1" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 211 298 Q 207 355, 203 415 Q 199 450, 195 475" stroke="#0891B2" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 241 298 Q 239 345, 236 395 Q 233 430, 230 455" stroke="#0891B2" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Center tentacle -->
  <path d="M 256 298 Q 255 365, 254 430 Q 253 460, 252 480" stroke="#6366F1" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Right tentacles -->
  <path d="M 271 298 Q 273 345, 276 395 Q 279 430, 282 455" stroke="#0891B2" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 301 298 Q 305 355, 309 415 Q 313 450, 317 475" stroke="#0891B2" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M 336 298 Q 342 350, 347 400 Q 352 435, 358 465" stroke="#6366F1" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Bioluminescent dots -->
  <circle cx="176" cy="365" r="3.5" fill="#67E8F9" opacity="0.8"/>
  <circle cx="203" cy="395" r="2.5" fill="#67E8F9" opacity="0.7"/>
  <circle cx="236" cy="340" r="2" fill="#67E8F9" opacity="0.6"/>
  <circle cx="256" cy="370" r="3" fill="#67E8F9" opacity="0.8"/>
  <circle cx="276" cy="340" r="2" fill="#67E8F9" opacity="0.6"/>
  <circle cx="309" cy="395" r="2.5" fill="#67E8F9" opacity="0.7"/>
  <circle cx="336" cy="365" r="3.5" fill="#67E8F9" opacity="0.8"/>
  <circle cx="188" cy="430" r="2" fill="#67E8F9" opacity="0.5"/>
  <circle cx="256" cy="420" r="2.5" fill="#67E8F9" opacity="0.6"/>
  <circle cx="324" cy="430" r="2" fill="#67E8F9" opacity="0.5"/>
</svg>